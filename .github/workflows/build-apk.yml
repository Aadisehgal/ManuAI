name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null
      - run: yarn install --no-immutable
      - name: Patch react-native version in all node_modules
        run: |
          find node_modules -name "build.gradle" | while read f; do
            sed -i "s|['\"]com\.facebook\.react:react-native:+['\"]|'com.facebook.react:react-android:0.74.3'|g" "$f"
            sed -i "s|['\"]com\.facebook\.react:react-native:[^'\"]*['\"]|'com.facebook.react:react-android:0.74.3'|g" "$f"
          done
      - name: Fix buildConfig for modules
        run: |
          find node_modules -name "build.gradle" | while read f; do
            if grep -q "buildConfigField\|resValue" "$f" 2>/dev/null; then
              if ! grep -q "buildConfig true" "$f"; then
                sed -i '/^android {/a\    buildFeatures { buildConfig true }' "$f"
              fi
            fi
          done
      - name: Fix missing namespace
        run: |
          find node_modules -name "build.gradle" | while read f; do
            if grep -q "namespace" "$f" 2>/dev/null; then continue; fi
            manifest="$(dirname $f)/src/main/AndroidManifest.xml"
            if [ -f "$manifest" ]; then
              pkg=$(grep -o 'package="[^"]*"' "$manifest" | head -1 | sed 's/package="//;s/"//')
              if [ -n "$pkg" ]; then
                sed -i "/^android {/a\\    namespace \"$pkg\"" "$f"
              fi
            fi
          done
      - name: Fix JVM target to 17
        run: |
          find node_modules -name "build.gradle" | while read f; do
            sed -i 's/JavaVersion\.VERSION_1_8/JavaVersion.VERSION_17/g' "$f"
            sed -i 's/JavaVersion\.VERSION_11/JavaVersion.VERSION_17/g' "$f"
            sed -i 's/jvmTarget = "1\.8"/jvmTarget = "17"/g' "$f"
            sed -i 's/jvmTarget = "11"/jvmTarget = "17"/g' "$f"
          done
      - name: Setup release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/manu-release.keystore
      - name: Build JS bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      - name: Build signed release APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew app:generatePackageList assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/manu-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      - uses: actions/upload-artifact@v4
        with:
          name: manu-ai-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/app/build/outputs/logs
          if-no-files-found: ignore
